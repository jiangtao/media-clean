name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/android-debug.yml"
      - "app.json"
      - "package.json"
      - "plugins/**"
      - "scripts/android/**"
      - "android/**"
      - "docs/release/android.md"
      - "docs/release/android.en.md"
      - "README.md"
      - "README.en.md"

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Build debug APK
        run: bash scripts/android/build-debug-apk.sh --skip-install

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            artifacts/android-debug/app-debug.signing.txt
            artifacts/android-debug/app-debug.sha256
            artifacts/android-debug/debug-metadata.json
