name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "正式 Android release tag，例如 android-v0.0.1"
        required: true
        type: string
      release_architectures:
        description: "Release APK ABI，用户侧默认 armeabi-v7a,arm64-v8a；确认设备矩阵后可用 arm64-v8a"
        required: false
        default: "armeabi-v7a,arm64-v8a"
        type: string
      enable_minify:
        description: "启用 R8 minify。包体积优化专项验证后默认开启；如遇 native 回归可手动关闭"
        required: false
        default: true
        type: boolean
      enable_resource_shrink:
        description: "启用 Android resource shrink。包体积优化专项验证后默认开启；需与 R8 一起使用"
        required: false
        default: true
        type: boolean
      enable_legacy_packaging:
        description: "启用 legacy native .so packaging。包体积优化专项验证后默认开启；如遇启动或低端机回归可手动关闭"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_FILENAME: ${{ vars.ANDROID_KEYSTORE_FILENAME || 'release.jks' }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      VERCEL_ORG_ID: team_KMAhi2p340W6VAP8OPUVhJh7
      VERCEL_PROJECT_ID: prj_MP950Qnus5voEiUep7mT2GHeP8wq
      PAGE_PRODUCTION_URL: https://mc.jerret.me
      ANDROID_LATEST_APK_URL: https://mc.jerret.me/download/android-latest.apk
      ANDROID_RELEASE_ARCHITECTURES: ${{ inputs.release_architectures || vars.ANDROID_RELEASE_ARCHITECTURES || 'armeabi-v7a,arm64-v8a' }}
      ANDROID_ENABLE_MINIFY_IN_RELEASE_BUILDS: ${{ inputs.enable_minify && '1' || '0' }}
      ANDROID_ENABLE_SHRINK_RESOURCES_IN_RELEASE_BUILDS: ${{ inputs.enable_resource_shrink && '1' || '0' }}
      ANDROID_USE_LEGACY_PACKAGING: ${{ inputs.enable_legacy_packaging && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build tooling
        run: sdkmanager "platform-tools" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Verify release-page contract
        run: node scripts/release/verify-android-release-page-contract.mjs

      - name: Resolve release tag
        id: release_tag
        run: |
          TAG="${{ github.event.inputs.release_tag }}"

          if [[ ! "${TAG}" =~ ^android-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "非法 release tag: ${TAG}" >&2
            exit 1
          fi

          VERSION="${TAG#android-v}"
          echo "value=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build signed APK
        run: bash scripts/android/build-release-apk.sh --skip-install

      - name: Analyze APK size
        run: |
          APK_SIZE_PROFILE="user-arm-only"
          EXPECTED_ABIS="${ANDROID_RELEASE_ARCHITECTURES}"
          case "${ANDROID_RELEASE_ARCHITECTURES}" in
            arm64-v8a)
              APK_SIZE_PROFILE="user-arm64"
              ;;
            universal)
              APK_SIZE_PROFILE="internal-universal"
              EXPECTED_ABIS="armeabi-v7a,arm64-v8a,x86,x86_64"
              ;;
          esac

          node scripts/android/analyze-apk-size.mjs \
            android/app/build/outputs/apk/release/app-release.apk \
            --out-dir artifacts/android-release \
            --profile "${APK_SIZE_PROFILE}" \
            --expected-abis "${EXPECTED_ABIS}" \
            --fail-on-budget
          node scripts/android/collect-release-metadata.mjs \
            android/app/build/outputs/apk/release/app-release.apk

      - name: Prepare release assets
        id: release_assets
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
          RELEASE_VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          VERSIONED_APK="artifacts/android-release/media-clean-android-v${RELEASE_VERSION}.apk"
          LATEST_APK="artifacts/android-release/media-clean-android-latest.apk"
          VERSIONED_SHA="artifacts/android-release/media-clean-android-v${RELEASE_VERSION}.sha256"
          VERSIONED_METADATA="artifacts/android-release/media-clean-android-v${RELEASE_VERSION}.metadata.json"
          VERSIONED_SIZE_REPORT_MD="artifacts/android-release/media-clean-android-v${RELEASE_VERSION}.size-report.md"
          VERSIONED_SIZE_REPORT_JSON="artifacts/android-release/media-clean-android-v${RELEASE_VERSION}.size-report.json"

          cp "android/app/build/outputs/apk/release/app-release.apk" "${VERSIONED_APK}"
          cp "android/app/build/outputs/apk/release/app-release.apk" "${LATEST_APK}"
          cp "artifacts/android-release/app-release.sha256" "${VERSIONED_SHA}"
          cp "artifacts/android-release/release-metadata.json" "${VERSIONED_METADATA}"
          cp "artifacts/android-release/apk-size-report.md" "${VERSIONED_SIZE_REPORT_MD}"
          cp "artifacts/android-release/apk-size-report.json" "${VERSIONED_SIZE_REPORT_JSON}"

          GITHUB_BACKUP_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/media-clean-android-latest.apk"
          {
            echo "versioned_apk=${VERSIONED_APK}"
            echo "latest_apk=${LATEST_APK}"
            echo "versioned_sha=${VERSIONED_SHA}"
            echo "versioned_metadata=${VERSIONED_METADATA}"
            echo "versioned_size_report_md=${VERSIONED_SIZE_REPORT_MD}"
            echo "versioned_size_report_json=${VERSIONED_SIZE_REPORT_JSON}"
            echo "download_url=${ANDROID_LATEST_APK_URL}"
            echo "github_backup_download_url=${GITHUB_BACKUP_DOWNLOAD_URL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "release tag 已存在: ${RELEASE_TAG}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: Media Clean Android ${{ steps.release_tag.outputs.version }}
          generate_release_notes: true
          body: |
            ## 包体积优化专项

            本次 Android release 默认启用已验证的体积优化组合：

            - 双 ARM ABI：保留 `armeabi-v7a,arm64-v8a`，排除 `x86/x86_64` 模拟器 ABI，兼顾用户覆盖和下载体积。
            - R8 minify：裁剪未使用 Java/Kotlin/React Native bridge 代码，降低 dex 体积；风险是反射、原生桥接或 keep rule 缺失导致运行时回归。
            - Android resource shrink：裁剪未使用资源；风险是动态资源引用被误裁，需要真机回归覆盖图片、视频、通知和启动资源。
            - Legacy native `.so` packaging：压缩 native libraries，显著降低 page 单 APK 下载体积；风险是安装、启动时间和低端机 native 装载行为变化。

            本地 release-like smoke 的参考结果为 23.690 MiB；正式签名产物以本 workflow 的 size report、checksum 和 page 下载验证为准。
          make_latest: true
          files: |
            ${{ steps.release_assets.outputs.versioned_apk }}
            ${{ steps.release_assets.outputs.latest_apk }}
            ${{ steps.release_assets.outputs.versioned_sha }}
            ${{ steps.release_assets.outputs.versioned_metadata }}
            ${{ steps.release_assets.outputs.versioned_size_report_md }}
            ${{ steps.release_assets.outputs.versioned_size_report_json }}
          overwrite_files: true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            artifacts/android-release/app-release.signing.txt
            artifacts/android-release/app-release.sha256
            artifacts/android-release/release-metadata.json
            artifacts/android-release/media-clean-android-v*.apk
            artifacts/android-release/media-clean-android-latest.apk
            artifacts/android-release/media-clean-android-v*.sha256
            artifacts/android-release/media-clean-android-v*.metadata.json
            artifacts/android-release/apk-size-report.md
            artifacts/android-release/apk-size-report.json
            artifacts/android-release/media-clean-android-v*.size-report.md
            artifacts/android-release/media-clean-android-v*.size-report.json

      - name: Prepare page Android download asset
        run: node scripts/release/prepare-page-android-download.mjs --apk android/app/build/outputs/apk/release/app-release.apk

      - name: Deploy page download to Vercel production
        id: deploy_page
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "缺少 GitHub secret: VERCEL_TOKEN" >&2
            exit 1
          fi

          cd page
          npx vercel pull --yes --environment=production --token "${VERCEL_TOKEN}"
          npx vercel build --prod --token "${VERCEL_TOKEN}"

          DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --prod --yes --token "${VERCEL_TOKEN}")"
          printf '%s\n' "${DEPLOY_OUTPUT}"

          DEPLOYMENT_URL="$(printf '%s\n' "${DEPLOY_OUTPUT}" | grep -Eo 'https://[^[:space:]]+' | tail -n 1)"
          if [ -z "${DEPLOYMENT_URL}" ]; then
            echo "无法从部署输出中解析 deployment url" >&2
            exit 1
          fi

          echo "deployment_url=${DEPLOYMENT_URL}" >> "${GITHUB_OUTPUT}"

      - name: Verify production page download
        run: |
          curl -fsSIL "${PAGE_PRODUCTION_URL}"
          PAGE_HTML="$(curl -sS "${PAGE_PRODUCTION_URL}")"
          printf '%s' "${PAGE_HTML}" | grep -q '下载 Android'
          printf '%s' "${PAGE_HTML}" | grep -q 'Android APK'
          printf '%s' "${PAGE_HTML}" | grep -q "${ANDROID_LATEST_APK_URL}"
          curl -fsSIL "${ANDROID_LATEST_APK_URL}"

      - name: Publish release summary
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
          RELEASE_VERSION: ${{ steps.release_tag.outputs.version }}
          GITHUB_BACKUP_DOWNLOAD_URL: ${{ steps.release_assets.outputs.github_backup_download_url }}
          PAGE_DEPLOYMENT_URL: ${{ steps.deploy_page.outputs.deployment_url }}
        run: |
          {
            echo "## Android release 已发布"
            echo
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Canonical page download URL: ${ANDROID_LATEST_APK_URL}"
            echo "- Page deployment URL: ${PAGE_DEPLOYMENT_URL}"
            echo "- GitHub backup asset URL: ${GITHUB_BACKUP_DOWNLOAD_URL}"
            echo "- Release architectures: \`${ANDROID_RELEASE_ARCHITECTURES}\`"
            echo "- R8 minify: \`${ANDROID_ENABLE_MINIFY_IN_RELEASE_BUILDS}\`"
            echo "- Resource shrink: \`${ANDROID_ENABLE_SHRINK_RESOURCES_IN_RELEASE_BUILDS}\`"
            echo "- Legacy native packaging: \`${ANDROID_USE_LEGACY_PACKAGING}\`"
            echo
            echo "### 包体积优化专项"
            echo
            echo "| 手段 | 收益 | 风险 / 取舍 |"
            echo "| --- | --- | --- |"
            echo "| 双 ARM ABI | 排除 x86/x86_64 模拟器 ABI，减少用户下载体积 | 仍保留 32-bit ARM；若未来只发 arm64 可继续下降 |"
            echo "| R8 minify | 降低 dex 体积 | 需要 keep rule 和 native bridge 回归 |"
            echo "| Resource shrink | 裁剪未使用资源 | 需要覆盖动态资源、图片、视频、通知和启动资源 |"
            echo "| Legacy native packaging | 压缩 native .so，显著降低 page 单 APK | 需要关注安装、启动时间和低端机 native 装载 |"
            echo
            cat artifacts/android-release/apk-size-report.md
          } >> "${GITHUB_STEP_SUMMARY}"
