name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "android-v*"

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_FILENAME: ${{ vars.ANDROID_KEYSTORE_FILENAME || 'release.jks' }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Build signed APK
        run: bash scripts/android/build-release-apk.sh --skip-install

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            artifacts/android-release/app-release.signing.txt
            artifacts/android-release/app-release.sha256
            artifacts/android-release/release-metadata.json
