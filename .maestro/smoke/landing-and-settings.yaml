appId: com.jt.mistapmediacleaner
name: Landing and settings smoke
---
- launchApp
- extendedWaitUntil:
    visible:
      id: landing-screen
    timeout: 60000
- assertVisible:
    id: landing-screen
- scrollUntilVisible:
    element:
      id: landing-primary-action
    direction: DOWN
    timeout: 20000
- tapOn:
    id: landing-primary-action
- assertVisible:
    id: tab-button-Settings
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: tab-button-Settings
- extendedWaitUntil:
    visible:
      id: settings-header
    timeout: 30000
- assertVisible:
    id: settings-header
- scrollUntilVisible:
    element:
      id: language-option-en-US
    direction: DOWN
    timeout: 20000
- tapOn:
    id: language-option-en-US
- scrollUntilVisible:
    element:
      text: "Scan Range"
    direction: UP
    timeout: 20000
- assertVisible: "Scan Range"
- scrollUntilVisible:
    element:
      text: "Appearance"
    direction: DOWN
    timeout: 20000
- assertVisible: "Appearance"
- scrollUntilVisible:
    element:
      id: theme-option-dark
    direction: DOWN
    timeout: 20000
- tapOn:
    id: theme-option-dark
- assertVisible: "Dark"
- tapOn:
    id: theme-option-light
- scrollUntilVisible:
    element:
      id: language-option-zh-CN
    direction: UP
    timeout: 20000
- tapOn:
    id: language-option-zh-CN
- scrollUntilVisible:
    element:
      text: "扫描范围"
    direction: UP
    timeout: 20000
- assertVisible: "扫描范围"
- scrollUntilVisible:
    element:
      text: "显示主题"
    direction: DOWN
    timeout: 20000
- assertVisible: "显示主题"
