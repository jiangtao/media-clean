name: Android Maestro Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/android-maestro-smoke.yml"
      - ".maestro/**"
      - "src/ui/**"
      - "src/navigation/**"
      - "src/application/**"
      - "src/i18n/**"
      - "src/theme/**"
      - "app.json"
      - "package.json"
      - "scripts/android/**"
      - "android/**"
      - "README.md"
      - "README.en.md"
      - "docs/release/maestro.md"
      - "docs/release/maestro.en.md"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - ".github/workflows/android-maestro-smoke.yml"
      - ".maestro/**"
      - "src/ui/**"
      - "src/navigation/**"
      - "src/application/**"
      - "src/i18n/**"
      - "src/theme/**"
      - "app.json"
      - "package.json"
      - "scripts/android/**"
      - "android/**"
      - "README.md"
      - "README.en.md"
      - "docs/release/maestro.md"
      - "docs/release/maestro.en.md"

permissions:
  contents: read

jobs:
  maestro-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Build debug APK
        run: bash scripts/android/build-debug-apk.sh --skip-install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 30
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            npx expo start --dev-client --clear --port 8081 > /tmp/expo.log 2>&1 &
            for attempt in $(seq 1 60); do curl -fsS http://127.0.0.1:8081/status 2>/dev/null | grep -q "packager-status:running" && exit 0; sleep 2; done; echo "Expo dev server did not report running"; tail -n 200 /tmp/expo.log || true; exit 1
            curl -fsS "http://127.0.0.1:8081/index.bundle?platform=android&dev=true&minify=false" > /tmp/index.android.bundle
            adb reverse tcp:8081 tcp:8081
            mkdir -p artifacts/maestro
            rm -rf /tmp/maestro-smoke-ci
            mkdir -p /tmp/maestro-smoke-ci
            cp .maestro/smoke/*.yaml /tmp/maestro-smoke-ci/
            sed -i 's/^appId: .*/appId: com.jt.mistapmediacleaner.debug/' /tmp/maestro-smoke-ci/*.yaml
            MAESTRO_CLI_NO_ANALYTICS=1 maestro --device emulator-5554 test --format junit --output artifacts/maestro/maestro-report.xml --test-output-dir artifacts/maestro /tmp/maestro-smoke-ci || (adb exec-out screencap -p > artifacts/maestro/failure.png || true; adb shell uiautomator dump /sdcard/window.xml || true; adb pull /sdcard/window.xml artifacts/maestro/window.xml || true; adb logcat -d -t 500 > artifacts/maestro/logcat-tail.txt || true; tail -n 200 /tmp/expo.log > artifacts/maestro/expo-tail.log || true; exit 1)

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-maestro-smoke
          if-no-files-found: warn
          path: |
            artifacts/maestro/**
            /tmp/expo.log
            artifacts/android-debug/app-debug.signing.txt
            artifacts/android-debug/app-debug.sha256
            artifacts/android-debug/debug-metadata.json
