name: Android Release Build Smoke

on:
  # Release builds are expensive and do not cover normal UI smoke paths.
  # Run this manually before release/signing changes instead of on every PR.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Build temp-signed APK
        run: bash scripts/android/build-release-apk.sh --temp-keystore --skip-install

      - name: Build debug APK
        run: bash scripts/android/build-debug-apk.sh --skip-install

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-smoke
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
            artifacts/android-release/app-release.signing.txt
            artifacts/android-release/app-release.sha256
            artifacts/android-release/release-metadata.json
            artifacts/android-debug/app-debug.signing.txt
            artifacts/android-debug/app-debug.sha256
            artifacts/android-debug/debug-metadata.json
